name: firestore-cost-guard

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente objetivo"
        type: choice
        required: true
        default: all
        options:
          - all
          - dev
          - staging
          - prod
      window_hours:
        description: "Ventana de evaluación en horas"
        required: false
        default: "24"
      fail_on_warn:
        description: "Fallar también en warning"
        type: boolean
        required: false
        default: false
      thresholds_file:
        description: "Ruta del archivo de umbrales (JSON)"
        required: false
        default: "docs/ops/firestore_cost_thresholds.json"
  schedule:
    - cron: "15 3 * * *"

concurrency:
  group: firestore-cost-guard-${{ github.event_name }}-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prod' }}
  cancel-in-progress: true

jobs:
  cost-guard:
    name: Firestore Cost Guard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    env:
      TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prod' }}
      WINDOW_HOURS: ${{ github.event_name == 'workflow_dispatch' && inputs.window_hours || '24' }}
      FAIL_ON_WARN: ${{ github.event_name == 'workflow_dispatch' && inputs.fail_on_warn || 'false' }}
      THRESHOLDS_FILE: ${{ github.event_name == 'workflow_dispatch' && inputs.thresholds_file || 'docs/ops/firestore_cost_thresholds.json' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Validate thresholds file
        run: |
          set -euo pipefail
          test -f "${THRESHOLDS_FILE}"
          jq empty "${THRESHOLDS_FILE}"

      - name: Resolve authentication mode
        id: auth_mode
        env:
          GCP_MONITORING_WIF_PROVIDER: ${{ vars.GCP_MONITORING_WIF_PROVIDER }}
          GCP_MONITORING_SERVICE_ACCOUNT: ${{ vars.GCP_MONITORING_SERVICE_ACCOUNT }}
          GCP_MONITORING_SA_KEY: ${{ secrets.GCP_MONITORING_SA_KEY }}
        run: |
          set -euo pipefail
          has_oidc=false
          has_key=false

          if [[ -n "${GCP_MONITORING_WIF_PROVIDER}" && -n "${GCP_MONITORING_SERVICE_ACCOUNT}" ]]; then
            has_oidc=true
          fi
          if [[ -n "${GCP_MONITORING_SA_KEY}" ]]; then
            has_key=true
          fi

          if [[ "${has_oidc}" != "true" && "${has_key}" != "true" ]]; then
            echo "::error::Missing auth config. Set OIDC vars (GCP_MONITORING_WIF_PROVIDER + GCP_MONITORING_SERVICE_ACCOUNT) or secret GCP_MONITORING_SA_KEY."
            exit 1
          fi

          if [[ "${has_oidc}" == "true" ]]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
            echo "Using OIDC Workload Identity Federation" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "mode=key" >> "$GITHUB_OUTPUT"
            echo "Using JSON key fallback" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Auth GCP (OIDC)
        if: steps.auth_mode.outputs.mode == 'oidc'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_MONITORING_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_MONITORING_SERVICE_ACCOUNT }}

      - name: Auth GCP (service account key fallback)
        if: steps.auth_mode.outputs.mode == 'key'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_MONITORING_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install functions deps
        working-directory: functions
        run: npm ci

      - name: Run Firestore cost guard
        working-directory: functions
        run: |
          set -euo pipefail
          mkdir -p ../docs/ops/generated

          targets=(
            "dev:tum2-dev-6283d"
            "staging:tum2-staging-45c83"
            "prod:tum2-prod-bc9b4"
          )

          for target in "${targets[@]}"; do
            env_name="${target%%:*}"
            project_id="${target##*:}"

            if [[ "${TARGET_ENV}" != "all" && "${TARGET_ENV}" != "${env_name}" ]]; then
              continue
            fi

            args=(
              --project "${project_id}"
              --env "${env_name}"
              --window-hours "${WINDOW_HOURS}"
              --thresholds "../${THRESHOLDS_FILE}"
              --out "../docs/ops/generated/cost-guard-${env_name}.json"
            )

            if [[ "${FAIL_ON_WARN}" == "true" || "${env_name}" == "prod" ]]; then
              args+=(--fail-on-warn)
            fi

            echo "Running cost guard for ${env_name} (${project_id})"
            npm run cost:guard -- "${args[@]}"
          done

      - name: Build FinOps summary
        working-directory: functions
        run: |
          set -euo pipefail
          npm run finops:summary -- \
            --input-dir ../docs/ops/generated \
            --out ../docs/ops/generated/finops-summary.json
          npm run finops:summary -- \
            --input-dir ../docs/ops/generated \
            --markdown \
            --out ../docs/ops/generated/finops-summary.md

      - name: Run FinOps gate
        working-directory: functions
        run: |
          set -euo pipefail

          warn_envs="prod"
          if [[ "${FAIL_ON_WARN}" == "true" ]]; then
            warn_envs="dev,staging,prod"
          fi

          only_envs=""
          if [[ "${TARGET_ENV}" != "all" ]]; then
            only_envs="${TARGET_ENV}"
          fi

          args=(
            --summary ../docs/ops/generated/finops-summary.json
            --fail-on-warn-envs "${warn_envs}"
          )
          if [[ -n "${only_envs}" ]]; then
            args+=(--only-envs "${only_envs}")
          fi

          npm run finops:gate -- "${args[@]}"

      - name: Upload guardrail reports
        uses: actions/upload-artifact@v4
        with:
          name: firestore-cost-guard-reports
          path: docs/ops/generated/cost-guard-*.json
          retention-days: 14
