name: Enforce PR Base Branch

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  enforce-base-develop:
    name: Reject non-develop PR base
    runs-on: ubuntu-latest
    steps:
      - name: Fail if PR does not target develop
        if: ${{ github.base_ref != 'develop' }}
        run: |
          echo "PR base '${GITHUB_BASE_REF}' is not allowed."
          echo "All pull requests must target 'develop'."
          exit 1

      - name: Comment and close non-compliant PR
        if: ${{ github.base_ref != 'develop' }}
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                "Este repositorio acepta PRs solo hacia `develop`.",
                `Base detectada: \`${pr.base.ref}\`.`,
                "Cerrando automáticamente este PR. Reabrilo con base `develop`."
              ].join("\n")
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              state: "closed"
            });
