name: tum2_admin
description: TuM2 Admin — Portal web de administración del directorio de comercios.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # Firebase
  firebase_core: ^2.30.1
  firebase_auth: ^4.19.5
  cloud_firestore: ^4.17.3
  cloud_functions: ^4.7.3
  firebase_app_check: ^0.2.2+7

  # File picker (web-compatible)
  file_picker: ^8.0.0+1

  # CSV parsing
  csv: ^6.0.0
  excel: ^4.0.6
  crypto: ^3.0.6

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/worldcup/
