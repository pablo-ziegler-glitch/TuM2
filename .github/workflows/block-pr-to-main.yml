name: Block PRs to main

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  block-main-base:
    runs-on: ubuntu-latest
    steps:
      - name: Fail if PR targets main
        if: ${{ github.base_ref == 'main' }}
        run: |
          echo "PRs targeting 'main' are forbidden. Use 'develop' as base branch."
          exit 1

      - name: Close PR targeting main
        if: ${{ github.base_ref == 'main' }}
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: "Este repositorio no acepta PRs hacia `main`. Reabrí el PR con base `develop`."
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              state: "closed"
            });
