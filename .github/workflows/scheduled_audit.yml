name: scheduled-audit

on:
  workflow_dispatch:
    inputs:
      force_full_audit:
        description: "Forzar auditoría amplia (solo uso manual)"
        required: false
        type: boolean
        default: false
  schedule:
    # GitHub usa UTC. America/Argentina/Buenos_Aires (UTC-3):
    # 06:00, 12:00, 16:00, 20:00 local => 09:00, 15:00, 19:00, 23:00 UTC
    - cron: "0 9,15,19,23 * * *"

concurrency:
  group: scheduled-audit
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 25
    permissions:
      contents: read
      issues: write
    env:
      # Adelanta la migración para que las JavaScript actions no ejecuten en Node 20.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      AUDIT_TARGET_BRANCH: ${{ vars.AUDIT_TARGET_BRANCH || 'develop' }}
      AUDIT_MODEL: ${{ vars.AUDIT_MODEL || 'gemini-2.5-flash' }}
      AUDIT_ARTIFACT_RETENTION_DAYS: ${{ vars.AUDIT_ARTIFACT_RETENTION_DAYS || '30' }}
      AUDIT_MAX_FILES: ${{ vars.AUDIT_MAX_FILES || '25' }}
      AUDIT_MAX_INPUT_CHARS: ${{ vars.AUDIT_MAX_INPUT_CHARS || '220000' }}
      # Política: auditar repositorio completo en cada corrida programada.
      AUDIT_FORCE_FULL: "true"

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch target branch explicitly
        run: |
          set -euo pipefail
          git fetch origin "${AUDIT_TARGET_BRANCH}" --depth=300

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install audit dependencies
        run: npm ci

      - name: Run scheduled audit
        id: audit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run audit:scheduled

      - name: Upload audit artifact
        if: steps.audit.outputs.audited == 'true' && steps.audit.outputs.artifact_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.audit.outputs.artifact_name }}
          path: ${{ steps.audit.outputs.artifact_path }}
          retention-days: ${{ vars.AUDIT_ARTIFACT_RETENTION_DAYS || 30 }}
