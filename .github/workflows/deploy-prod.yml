name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      force_full_deploy:
        description: "Deploy all components regardless of changed files"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - "firebase.json"
      - "firestore.rules"
      - "firestore.indexes.json"
      - "storage.rules"
      - "functions/**"
      - "schema/**"
      - "mobile/**"
      - "web/**"

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: tum2-prod-bc9b4
  ADMIN_WEB_APP_ID: 1:57567901381:web:c2e9f6a256643cf36662ac
  MOBILE_WEB_APP_ID: 1:57567901381:web:dadc4aec40273a4e6662ac

jobs:
  detect-changes:
    name: Detect Deploy Scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      any_changed: ${{ steps.filter.outputs.any_changed }}
      firestore_rules: ${{ steps.filter.outputs.firestore_rules }}
      firestore_indexes: ${{ steps.filter.outputs.firestore_indexes }}
      storage_rules: ${{ steps.filter.outputs.storage_rules }}
      functions: ${{ steps.filter.outputs.functions }}
      hosting_web: ${{ steps.filter.outputs.hosting_web }}
      hosting_admin: ${{ steps.filter.outputs.hosting_admin }}
      firebase_config: ${{ steps.filter.outputs.firebase_config }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            any_changed:
              - "firebase.json"
              - "firestore.rules"
              - "firestore.indexes.json"
              - "storage.rules"
              - "functions/**"
              - "schema/**"
              - "mobile/**"
              - "web/**"
            firestore_rules:
              - "firestore.rules"
            firestore_indexes:
              - "firestore.indexes.json"
            storage_rules:
              - "storage.rules"
            functions:
              - "functions/**"
              - "schema/**"
            hosting_web:
              - "mobile/**"
            hosting_admin:
              - "web/**"
            firebase_config:
              - "firebase.json"

  deploy:
    name: Deploy to Firebase Prod
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce branch for manual deploy
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "::error::Manual deploy to prod is only allowed from branch 'main'. Current branch: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Validate target project
        run: |
          set -euo pipefail
          if [[ "${PROJECT_ID}" == "tum2-dev" ]]; then
            echo "::error::Proyecto huérfano prohibido detectado: tum2-dev"
            exit 1
          fi

      - name: Validate project drift against secret (optional)
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [[ -n "${FIREBASE_PROJECT_ID}" && "${FIREBASE_PROJECT_ID}" != "${PROJECT_ID}" ]]; then
            echo "::error::Drift detectado: FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID} pero workflow usa PROJECT_ID=${PROJECT_ID}"
            exit 1
          fi

      - name: Resolve deploy scope
        id: scope
        run: |
          set -euo pipefail

          force_full="${{ github.event_name == 'workflow_dispatch' && inputs.force_full_deploy || 'false' }}"
          deploy_rules="${{ needs.detect-changes.outputs.firestore_rules }}"
          deploy_indexes="${{ needs.detect-changes.outputs.firestore_indexes }}"
          deploy_storage="${{ needs.detect-changes.outputs.storage_rules }}"
          deploy_functions="${{ needs.detect-changes.outputs.functions }}"
          deploy_hosting_web="${{ needs.detect-changes.outputs.hosting_web }}"
          deploy_hosting_admin="${{ needs.detect-changes.outputs.hosting_admin }}"
          firebase_config="${{ needs.detect-changes.outputs.firebase_config }}"

          if [[ "${force_full}" == "true" ]]; then
            deploy_rules=true
            deploy_indexes=true
            deploy_storage=true
            deploy_functions=true
            deploy_hosting_web=true
            deploy_hosting_admin=true
          fi

          if [[ "${firebase_config}" == "true" ]]; then
            deploy_rules=true
            deploy_indexes=true
            deploy_storage=true
            deploy_hosting_web=true
            deploy_hosting_admin=true
          fi

          deploy_hosting=false
          if [[ "${deploy_hosting_web}" == "true" || "${deploy_hosting_admin}" == "true" ]]; then
            deploy_hosting=true
          fi

          targets=()
          if [[ "${deploy_rules}" == "true" ]]; then targets+=("firestore:rules"); fi
          if [[ "${deploy_indexes}" == "true" ]]; then targets+=("firestore:indexes"); fi
          if [[ "${deploy_storage}" == "true" ]]; then targets+=("storage"); fi
          if [[ "${deploy_functions}" == "true" ]]; then targets+=("functions"); fi
          if [[ "${deploy_hosting_web}" == "true" ]]; then targets+=("hosting:web"); fi
          if [[ "${deploy_hosting_admin}" == "true" ]]; then targets+=("hosting:admin"); fi

          if [[ ${#targets[@]} -eq 0 ]]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          deploy_only="$(IFS=,; echo "${targets[*]}")"
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          echo "deploy_only=${deploy_only}" >> "$GITHUB_OUTPUT"
          echo "deploy_functions=${deploy_functions}" >> "$GITHUB_OUTPUT"
          echo "deploy_hosting=${deploy_hosting}" >> "$GITHUB_OUTPUT"
          echo "deploy_hosting_web=${deploy_hosting_web}" >> "$GITHUB_OUTPUT"
          echo "deploy_hosting_admin=${deploy_hosting_admin}" >> "$GITHUB_OUTPUT"

      - name: Skip when nothing to deploy
        if: steps.scope.outputs.should_deploy != 'true'
        run: echo "No deployable changes detected."

      - name: Resolve authentication mode
        if: steps.scope.outputs.should_deploy == 'true'
        id: auth_mode
        env:
          GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
          GCP_DEPLOYER_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          GCP_SA_KEY_PROD: ${{ secrets.GCP_SA_KEY_PROD }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          has_oidc=false
          has_key=false

          if [[ -n "${GCP_WIF_PROVIDER}" && -n "${GCP_DEPLOYER_SERVICE_ACCOUNT}" ]]; then
            has_oidc=true
          fi
          if [[ -n "${GCP_SA_KEY_PROD}" || -n "${FIREBASE_SERVICE_ACCOUNT}" ]]; then
            has_key=true
          fi

          if [[ "${has_oidc}" != "true" && "${has_key}" != "true" ]]; then
            echo "::error::Missing auth config. Set OIDC vars (GCP_WIF_PROVIDER + GCP_DEPLOYER_SERVICE_ACCOUNT) or secret GCP_SA_KEY_PROD/FIREBASE_SERVICE_ACCOUNT."
            exit 1
          fi

          if [[ "${has_oidc}" == "true" ]]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
            echo "Using OIDC Workload Identity Federation" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "mode=key" >> "$GITHUB_OUTPUT"
            echo "Using JSON key fallback" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Validate hosting variables
        if: steps.scope.outputs.deploy_hosting == 'true'
        env:
          HOSTING_SITE_WEB: ${{ vars.HOSTING_SITE_WEB_PROD }}
          HOSTING_SITE_ADMIN: ${{ vars.HOSTING_SITE_ADMIN_PROD }}
          ADMIN_WEB_APP_CHECK_SITE_KEY: ${{ vars.ADMIN_WEB_APP_CHECK_SITE_KEY_PROD }}
        run: |
          set -euo pipefail
          : "${HOSTING_SITE_WEB:?Set variable HOSTING_SITE_WEB_PROD in environment prod}"
          : "${HOSTING_SITE_ADMIN:?Set variable HOSTING_SITE_ADMIN_PROD in environment prod}"
          : "${ADMIN_WEB_APP_CHECK_SITE_KEY:?Set variable ADMIN_WEB_APP_CHECK_SITE_KEY_PROD in environment prod}"

      - name: Auth with GCP service account
        if: steps.scope.outputs.should_deploy == 'true' && steps.auth_mode.outputs.mode == 'oidc'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Auth with GCP service account key fallback
        if: steps.scope.outputs.should_deploy == 'true' && steps.auth_mode.outputs.mode == 'key'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PROD != '' && secrets.GCP_SA_KEY_PROD || secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Setup Node
        if: steps.scope.outputs.should_deploy == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase CLI
        if: steps.scope.outputs.should_deploy == 'true'
        run: npm install -g firebase-tools

      - name: Setup Flutter
        if: steps.scope.outputs.deploy_hosting == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Functions dependencies
        if: steps.scope.outputs.deploy_functions == 'true'
        working-directory: functions
        run: npm ci

      - name: Build Functions
        if: steps.scope.outputs.deploy_functions == 'true'
        working-directory: functions
        run: npm run build

      - name: Resolve Firebase config for public web app
        if: steps.scope.outputs.deploy_hosting_web == 'true'
        id: mobile_sdk
        run: |
          set -euo pipefail
          sdk_json="$(firebase apps:sdkconfig WEB "${MOBILE_WEB_APP_ID}" --project "${PROJECT_ID}" --json)"
          web_api_key="$(node -pe "JSON.parse(process.argv[1]).result.sdkConfig.apiKey" "${sdk_json}")"
          echo "web_api_key=${web_api_key}" >> "$GITHUB_OUTPUT"

      - name: Build public web (mobile)
        if: steps.scope.outputs.deploy_hosting_web == 'true'
        working-directory: mobile
        run: |
          flutter pub get
          flutter build web --release \
            --dart-define=ENV=prod \
            --dart-define=FIREBASE_WEB_API_KEY=${{ steps.mobile_sdk.outputs.web_api_key }} \
            -t lib/main.dart

      - name: Resolve Firebase config for admin web app
        if: steps.scope.outputs.deploy_hosting_admin == 'true'
        id: admin_sdk
        run: |
          set -euo pipefail
          sdk_json="$(firebase apps:sdkconfig WEB "${ADMIN_WEB_APP_ID}" --project "${PROJECT_ID}" --json)"

          api_key="$(node -pe "JSON.parse(process.argv[1]).result.sdkConfig.apiKey" "${sdk_json}")"
          app_id="$(node -pe "JSON.parse(process.argv[1]).result.sdkConfig.appId" "${sdk_json}")"
          sender_id="$(node -pe "JSON.parse(process.argv[1]).result.sdkConfig.messagingSenderId" "${sdk_json}")"
          project_id="$(node -pe "JSON.parse(process.argv[1]).result.sdkConfig.projectId" "${sdk_json}")"
          auth_domain="$(node -pe "JSON.parse(process.argv[1]).result.sdkConfig.authDomain" "${sdk_json}")"
          storage_bucket="$(node -pe "JSON.parse(process.argv[1]).result.sdkConfig.storageBucket" "${sdk_json}")"
          measurement_id="$(node -pe "JSON.parse(process.argv[1]).result.sdkConfig.measurementId" "${sdk_json}")"

          echo "api_key=${api_key}" >> "$GITHUB_OUTPUT"
          echo "app_id=${app_id}" >> "$GITHUB_OUTPUT"
          echo "sender_id=${sender_id}" >> "$GITHUB_OUTPUT"
          echo "project_id=${project_id}" >> "$GITHUB_OUTPUT"
          echo "auth_domain=${auth_domain}" >> "$GITHUB_OUTPUT"
          echo "storage_bucket=${storage_bucket}" >> "$GITHUB_OUTPUT"
          echo "measurement_id=${measurement_id}" >> "$GITHUB_OUTPUT"

      - name: Build admin web
        if: steps.scope.outputs.deploy_hosting_admin == 'true'
        working-directory: web
        run: |
          flutter pub get
          flutter build web --release \
            --dart-define=FIREBASE_API_KEY=${{ steps.admin_sdk.outputs.api_key }} \
            --dart-define=FIREBASE_APP_ID=${{ steps.admin_sdk.outputs.app_id }} \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID=${{ steps.admin_sdk.outputs.sender_id }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ steps.admin_sdk.outputs.project_id }} \
            --dart-define=FIREBASE_AUTH_DOMAIN=${{ steps.admin_sdk.outputs.auth_domain }} \
            --dart-define=FIREBASE_STORAGE_BUCKET=${{ steps.admin_sdk.outputs.storage_bucket }} \
            --dart-define=FIREBASE_MEASUREMENT_ID=${{ steps.admin_sdk.outputs.measurement_id }} \
            --dart-define=FIREBASE_APP_CHECK_SITE_KEY=${{ vars.ADMIN_WEB_APP_CHECK_SITE_KEY_PROD }}

      - name: Apply Hosting targets
        if: steps.scope.outputs.deploy_hosting == 'true'
        env:
          HOSTING_SITE_WEB: ${{ vars.HOSTING_SITE_WEB_PROD }}
          HOSTING_SITE_ADMIN: ${{ vars.HOSTING_SITE_ADMIN_PROD }}
        run: |
          set -euo pipefail
          : "${HOSTING_SITE_WEB:?Set environment variable HOSTING_SITE_WEB_PROD in environment prod}"
          : "${HOSTING_SITE_ADMIN:?Set environment variable HOSTING_SITE_ADMIN_PROD in environment prod}"

          firebase target:apply hosting web "${HOSTING_SITE_WEB}" --project "${PROJECT_ID}"
          firebase target:apply hosting admin "${HOSTING_SITE_ADMIN}" --project "${PROJECT_ID}"

      - name: Deploy selected resources
        if: steps.scope.outputs.should_deploy == 'true'
        run: |
          set -euo pipefail
          firebase deploy \
            --project "${PROJECT_ID}" \
            --only "${{ steps.scope.outputs.deploy_only }}" \
            --non-interactive

      - name: Smoke check Hosting
        if: steps.scope.outputs.deploy_hosting == 'true'
        run: |
          set -euo pipefail
          firebase hosting:sites:list --project "${PROJECT_ID}" >/dev/null

      - name: Smoke check Functions
        if: steps.scope.outputs.deploy_functions == 'true'
        run: |
          set -euo pipefail
          firebase functions:list --project "${PROJECT_ID}" --json >/dev/null

      - name: Generate deployment manifest
        if: steps.scope.outputs.should_deploy == 'true'
        run: |
          set -euo pipefail
          mkdir -p .ci-artifacts
          cat > .ci-artifacts/deploy-manifest-prod.json <<JSON
          {
            "workflow": "${GITHUB_WORKFLOW}",
            "runId": "${GITHUB_RUN_ID}",
            "environment": "prod",
            "projectId": "${PROJECT_ID}",
            "branch": "${GITHUB_REF_NAME}",
            "commit": "${GITHUB_SHA}",
            "targets": "${{ steps.scope.outputs.deploy_only }}",
            "authMode": "${{ steps.auth_mode.outputs.mode }}"
          }
          JSON

      - name: Upload deployment manifest
        if: steps.scope.outputs.should_deploy == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: deploy-manifest-prod-${{ github.run_id }}
          path: .ci-artifacts/deploy-manifest-prod.json
          retention-days: 30

      - name: Publish deployment summary
        if: steps.scope.outputs.should_deploy == 'true'
        run: |
          set -euo pipefail
          {
            echo "### Deploy Prod"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Project: \`${PROJECT_ID}\`"
            echo "- Targets: \`${{ steps.scope.outputs.deploy_only }}\`"
            echo "- Auth mode: \`${{ steps.auth_mode.outputs.mode }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
